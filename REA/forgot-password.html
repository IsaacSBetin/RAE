<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - RAE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <header class="login-header">
            <div class="header-content">
                <h1>RAE</h1>
                <p>Recuperação de Senha</p>
            </div>
        </header>

        <main class="login-main">
            <div class="login-form">
                <div class="section-header">
                    <i class="fas fa-key"></i>
                    <h2>Esqueceu sua senha?</h2>
                </div>
                <p style="margin-bottom: 24px; font-size: 14px; color: var(--text-muted);">Insira seu CPF ou e-mail cadastrado e enviaremos as instruções para criar uma nova senha.</p>
                
                <form id="forgotPasswordForm" novalidate>
                    <div id="forgotMessageContainer" class="message-banner" style="display: none; margin-bottom: 20px;"></div>
                    <div class="form-group">
                        <label for="recovery-id">CPF ou E-mail</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user" aria-hidden="true"></i>
                            <input 
                                type="text" 
                                id="recovery-id" 
                                name="recovery-id"
                                placeholder="000.000.000-00 ou e-mail" 
                                required
                            >
                        </div>
                    </div>

                    <button type="submit" class="btn-login">
                        <span class="btn-text">Enviar Instruções</span>
                    </button>
                </form>

                <div class="divider">
                    <span>ou</span>
                </div>

                <a href="index.html" class="btn-gov" style="text-decoration: none;">
                    <i class="fas fa-arrow-left"></i>
                    Voltar para o Login
                </a>
            </div>

            <footer class="login-footer">
                <p>Precisa de ajuda? <a href="#">Fale conosco</a></p>
            </footer>
        </main>
    </div>
    <script src="script.js"></script>
    <div class="theme-toggle">
        <button id="themeToggleBtn" class="btn-theme" aria-label="Alternar modo claro/escuro">
            <i class="fas fa-moon"></i>
        </button>
    </div>
</body>
</html>
