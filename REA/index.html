<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAE - Rede de Apoio Escolar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <header class="login-header">
            <div class="header-content">
                <h1>RAE</h1>
                <p>Rede de Apoio Escolar</p>
            </div>
        </header>

        <main class="login-main">
            <form class="login-form" id="loginForm" novalidate>
                <div class="form-group">
                    <label for="user-id">CPF ou Número de Matrícula</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user" aria-hidden="true"></i>
                        <input 
                            type="text" 
                            id="user-id" 
                            name="user-id"
                            placeholder="000.000.000-00" 
                            inputmode="numeric" 
                            autocomplete="username"
                            required
                            aria-required="true"
                        >
                    </div>
                    <span class="error-message" id="user-error">Por favor, insira um CPF ou matrícula válida.</span>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock" aria-hidden="true"></i>
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            placeholder="Digite sua senha" 
                            autocomplete="current-password"
                            required
                            aria-required="true"
                        >
                        <i class="fas fa-eye-slash" id="togglePassword" role="button" aria-label="Mostrar senha" tabindex="0"></i>
                    </div>
                    <span class="error-message" id="password-error">A senha é obrigatória.</span>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span>Lembrar de mim</span>
                    </label>
                    <a href="forgot-password.html" target="_blank" class="forgot-password">Esqueci minha senha</a>
                </div>

                <button type="submit" class="btn-login" id="submitBtn">
                    <span class="btn-text">Entrar</span>
                    <div class="loader"></div>
                </button>

                <div class="divider">
                    <span>ou</span>
                </div>

                <a href="https://sso.acesso.gov.br/" target="_blank" class="btn-gov" aria-label="Entrar com a conta gov.br" style="text-decoration: none;">
                    <i class="fas fa-shield-alt" aria-hidden="true"></i>
                    Entrar com gov.br
                </a>
            </form>

            <footer class="login-footer">
                <p>Não tem uma conta? <a href="request-access.html" target="_blank">Solicite acesso</a></p>
            </footer>
        </main>
    </div>
    <script src="script.js"></script>
    <div class="theme-toggle">
        <button id="themeToggleBtn" class="btn-theme" aria-label="Alternar modo claro/escuro">
            <i class="fas fa-moon"></i>
        </button>
    </div>
</body>
</html>
